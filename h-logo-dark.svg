<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="100%" height="100%">
  <defs>
    <style>
      @keyframes textPulse { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; } }
      .text-dark { animation: textPulse 3s ease-in-out infinite; }
      @keyframes highlightMoveDark { 0% { transform: translate(-2px, -4px); opacity: 0.25; } 50% { transform: translate(2px, 0px); opacity: 0.4; } 100% { transform: translate(-2px, -4px); opacity: 0.25; } }
      .highlight-dark { animation: highlightMoveDark 4s ease-in-out infinite; transform-origin: 0px 0px; }
      @keyframes rotateLeaves { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .rotating-group { animation: rotateLeaves 12s linear infinite; transform-origin: 0px 0px; }
    </style>
    <radialGradient id="sphereGradDark" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0a1a2e"/><stop offset="50%" stop-color="#0e4b6e"/><stop offset="100%" stop-color="#2aa9c9"/>
    </radialGradient>
    <linearGradient id="leafGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f9e8c"/><stop offset="100%" stop-color="#5ce0d0"/>
    </linearGradient>
    <linearGradient id="goldGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#ffdf7e"/>
    </linearGradient>
  </defs>
  <g transform="translate(10,10)">
    <g transform="translate(50,50)">
      <circle cx="0" cy="0" r="35" fill="none" stroke="url(#goldGradDark)" stroke-width="2.8"/>
      <circle cx="0" cy="0" r="29" fill="none" stroke="#0f1a3a" stroke-width="2"/>
      <circle cx="0" cy="0" r="22" fill="url(#sphereGradDark)" opacity="1"/>
      <circle class="highlight-dark" cx="0" cy="0" r="10" fill="white"/>
      <circle cx="-4" cy="-6" r="4" fill="white" opacity="0.4"/>
      <g class="rotating-group">
        <path d="M -32,-8 C -42,-15 -48,-5 -38,-2 C -48,0 -44,12 -34,6 Z" fill="url(#leafGradDark)" opacity="0.95"/>
        <path d="M -28,-12 C -36,-22 -44,-14 -36,-8 C -44,-4 -38,4 -30,-2 Z" fill="url(#leafGradDark)" opacity="0.9"/>
        <path d="M -26,4 C -34,14 -44,10 -34,4 C -44,0 -38,-8 -30,-2 Z" fill="url(#leafGradDark)" opacity="0.85"/>
        <g stroke="url(#goldGradDark)" stroke-width="1.8" fill="none" stroke-linecap="round">
          <path d="M 28,-14 C 40,-22 48,-16 44,-8"/><path d="M 30,-8 C 38,-12 46,-6 42,0"/><path d="M 24,-18 C 32,-28 44,-24 40,-14"/>
        </g>
        <circle cx="44" cy="-8" r="3" fill="url(#goldGradDark)"/><circle cx="42" cy="0" r="2.5" fill="url(#goldGradDark)"/><circle cx="40" cy="-14" r="3" fill="url(#goldGradDark)"/>
      </g>
    </g>
    <text class="text-dark" x="115" y="56" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="2" fill="#2aa9c9" text-anchor="start">JFr Sqlite Inc.</text>
    <text x="115" y="82" font-family="'Georgia', serif" font-size="20" font-style="italic" letter-spacing="1" fill="#5ce0d0" text-anchor="start">Kalu DB</text>
  </g>
</svg>