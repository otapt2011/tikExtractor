<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="100%" height="100%">
  <defs>
    <style>
      @keyframes textPulse { 0% { opacity: 0.85; } 50% { opacity: 1; } 100% { opacity: 0.85; } }
      .text-light { animation: textPulse 3s ease-in-out infinite; }
      @keyframes highlightMove { 0% { transform: translate(-2px, -4px); opacity: 0.15; } 50% { transform: translate(2px, 0px); opacity: 0.25; } 100% { transform: translate(-2px, -4px); opacity: 0.15; } }
      .highlight-light { animation: highlightMove 4s ease-in-out infinite; transform-origin: 0px 0px; }
      @keyframes rotateLeaves { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .rotating-group { animation: rotateLeaves 12s linear infinite; transform-origin: 0px 0px; }
    </style>
    <radialGradient id="sphereGradLight" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a5c"/><stop offset="60%" stop-color="#2a6f8f"/><stop offset="100%" stop-color="#4a9eb5"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a9d8f"/><stop offset="100%" stop-color="#6bcfbe"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a03d"/><stop offset="100%" stop-color="#f2d06b"/>
    </linearGradient>
  </defs>
  <g transform="translate(10,10)">
    <g transform="translate(50,50)">
      <circle cx="0" cy="0" r="35" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="29" fill="none" stroke="#1e2a5e" stroke-width="1.8"/>
      <circle cx="0" cy="0" r="22" fill="url(#sphereGradLight)" opacity="0.95"/>
      <circle class="highlight-light" cx="0" cy="0" r="8" fill="white"/>
      <g class="rotating-group">
        <path d="M -32,-8 C -42,-15 -48,-5 -38,-2 C -48,0 -44,12 -34,6 Z" fill="url(#leafGrad)" opacity="0.9"/>
        <path d="M -28,-12 C -36,-22 -44,-14 -36,-8 C -44,-4 -38,4 -30,-2 Z" fill="url(#leafGrad)" opacity="0.85"/>
        <path d="M -26,4 C -34,14 -44,10 -34,4 C -44,0 -38,-8 -30,-2 Z" fill="url(#leafGrad)" opacity="0.8"/>
        <g stroke="url(#goldGrad)" stroke-width="1.5" fill="none" stroke-linecap="round">
          <path d="M 28,-14 C 40,-22 48,-16 44,-8"/><path d="M 30,-8 C 38,-12 46,-6 42,0"/><path d="M 24,-18 C 32,-28 44,-24 40,-14"/>
        </g>
        <circle cx="44" cy="-8" r="2.5" fill="url(#goldGrad)"/><circle cx="42" cy="0" r="2" fill="url(#goldGrad)"/><circle cx="40" cy="-14" r="2.5" fill="url(#goldGrad)"/>
      </g>
    </g>
    <!-- Main text -->
    <text class="text-light" x="115" y="56" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="2" fill="#1a3a5c" text-anchor="start">JFr Sqlite Inc.</text>
    <!-- New subtext "Kalu DB" -->
    <text x="115" y="82" font-family="'Georgia', serif" font-size="20" font-style="italic" letter-spacing="1" fill="#6bcfbe" text-anchor="start">Kalu DB</text>
  </g>
</svg>